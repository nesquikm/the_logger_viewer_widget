name: the_logger_viewer_widget
description: "Embeddable Flutter widget for viewing logs from the_logger directly — no file export needed. Drop-in log viewer with filtering, search, session navigation, and real-time updates."
version: 0.0.3
repository: https://github.com/nesquikm/the_logger_viewer_widget
issue_tracker: https://github.com/nesquikm/the_logger_viewer_widget/issues

topics:
  - logging
  - debug
  - viewer
  - widget

environment:
  sdk: ^3.11.1
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  the_logger: ^0.0.20
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
